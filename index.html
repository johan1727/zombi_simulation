<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PANDEMIA</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0d0f14; }
      #app { position: fixed; inset: 0; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        color: #eaf2ff; font-family: system-ui, sans-serif; font-size: 14px;
        background: rgba(13, 15, 20, 0.65); padding: 8px 12px; border-radius: 8px;
        user-select: none; pointer-events: none;
      }
      #app.modo-habilidad { cursor: crosshair; }
      .hud-reloj-rojo { color: #ff5a5a; font-weight: 700; }
      #marcador-rival {
        position: fixed; top: 12px; right: 12px; z-index: 10;
        color: #eaf2ff; font-family: system-ui, sans-serif; font-size: 14px;
        font-weight: 600; background: rgba(13, 15, 20, 0.65);
        padding: 8px 12px; border-radius: 8px;
        user-select: none; pointer-events: none;
      }
      .marcador-arriba { color: #6fe08a; }
      .marcador-abajo { color: #ff5a5a; }
      #aviso-rival {
        position: fixed; top: 56px; right: 12px; z-index: 10;
        color: #eaf2ff; font-family: system-ui, sans-serif; font-size: 13px;
        background: rgba(120, 20, 20, 0.75); padding: 6px 10px; border-radius: 8px;
        user-select: none; pointer-events: none;
        opacity: 0; transition: opacity 400ms ease-out;
      }
      #aviso-rival.activo { opacity: 1; }
      #banner-reto {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
        color: #eaf2ff; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600;
        background: rgba(120, 80, 20, 0.75); padding: 6px 14px; border-radius: 8px;
        user-select: none; pointer-events: none; display: none;
      }
      #banner-reto.activo { display: block; }
      #btn-audio {
        position: fixed; top: 52px; left: 12px; z-index: 10;
        width: 32px; height: 32px; border-radius: 8px;
        background: rgba(13, 15, 20, 0.65); border: 1px solid rgba(234, 242, 255, 0.25);
        color: #eaf2ff; font-size: 15px; line-height: 1; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        user-select: none; padding: 0;
      }
      #btn-audio:hover { background: rgba(234, 242, 255, 0.12); }
      #tutorial-toast {
        position: fixed; left: 50%; bottom: 130px; transform: translateX(-50%); z-index: 15;
        color: #eaf2ff; font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500;
        background: rgba(13, 15, 20, 0.85); padding: 10px 18px; border-radius: 10px;
        max-width: min(92vw, 480px); text-align: center;
        user-select: none; pointer-events: none;
        opacity: 0; transition: opacity 300ms ease-out;
      }
      #tutorial-toast.activo { opacity: 1; }
      #flash-caida {
        position: fixed; inset: 0; z-index: 20; pointer-events: none;
        background: rgba(220, 40, 40, 0.45); opacity: 0;
        transition: opacity 300ms ease-out;
      }
      #flash-caida.activo { opacity: 1; }
      #barks { position: fixed; inset: 0; z-index: 12; pointer-events: none; }
      .bark-burbuja {
        position: absolute; left: 0; top: 0; transform: translate(-50%, -100%);
        margin-top: -8px; color: #0d0f14; font-family: system-ui, sans-serif;
        font-size: 12px; font-weight: 700; background: rgba(234, 242, 255, 0.92);
        padding: 4px 9px; border-radius: 10px; white-space: nowrap;
        opacity: 0; transition: opacity 250ms ease-out; user-select: none;
      }
      #panel-agentes {
        position: fixed; left: 50%; bottom: 12px; z-index: 10;
        transform: translateX(-50%);
        display: flex; gap: 8px;
        font-family: system-ui, sans-serif;
        user-select: none;
      }
      .agente-card {
        background: rgba(13, 15, 20, 0.65); border-radius: 8px;
        padding: 8px 10px; min-width: 150px;
        border: 1px solid transparent; cursor: pointer;
      }
      .agente-card.seleccionado { border-color: #eaf2ff; }
      .agente-card-nombre {
        color: #eaf2ff; font-size: 13px; font-weight: 600; margin-bottom: 4px;
      }
      .agente-card-nombre .tecla {
        display: inline-block; margin-left: 4px; padding: 0 5px;
        border-radius: 4px; background: rgba(234, 242, 255, 0.15);
        font-size: 11px; font-weight: 400; opacity: 0.8;
      }
      .agente-card-estado {
        color: #cdd8e6; font-size: 12px; margin-bottom: 6px;
      }
      .agente-card-habilidad {
        width: 100%; font-size: 12px; padding: 5px 6px; margin-bottom: 6px;
        border-radius: 6px; border: 1px solid rgba(234, 242, 255, 0.3);
        background: rgba(234, 242, 255, 0.08); color: #eaf2ff; cursor: pointer;
      }
      .agente-card-habilidad:hover:not(:disabled) { background: rgba(234, 242, 255, 0.18); }
      .agente-card-habilidad:disabled { opacity: 0.4; cursor: not-allowed; }
      .cooldown-bar {
        height: 4px; border-radius: 2px; overflow: hidden;
        background: rgba(234, 242, 255, 0.15);
      }
      .cooldown-fill { height: 100%; width: 0%; background: #4d9bff; }
      #resultado {
        position: fixed; inset: 0; z-index: 40; display: none;
        align-items: center; justify-content: center;
        background: rgba(6, 7, 10, 0.92);
        font-family: system-ui, sans-serif; color: #eaf2ff;
      }
      #resultado.activo { display: flex; }
      .resultado-caja {
        width: min(92vw, 520px); max-height: 92vh; overflow-y: auto;
        background: rgba(13, 15, 20, 0.9); border: 1px solid rgba(234, 242, 255, 0.15);
        border-radius: 14px; padding: 24px 28px; text-align: center;
      }
      .resultado-veredicto { font-size: 32px; font-weight: 800; letter-spacing: 1px; }
      .resultado-gano { color: #6fe08a; }
      .resultado-perdio { color: #ff5a5a; }
      .resultado-empate { color: #eaf2ff; }
      .resultado-motivo { margin-top: 4px; color: #cdd8e6; font-size: 13px; }
      .resultado-marcador { margin-top: 14px; font-size: 22px; font-weight: 700; }
      .resultado-svg { margin-top: 14px; width: 100%; height: auto; }
      .resultado-eje { stroke: rgba(234, 242, 255, 0.25); stroke-width: 1; }
      .resultado-umbral { stroke: rgba(255, 90, 90, 0.35); stroke-width: 1; stroke-dasharray: 3 3; }
      .resultado-curva-tu { fill: none; stroke: #6fe08a; stroke-width: 2; }
      .resultado-curva-rival { fill: none; stroke: #ff5a5a; stroke-width: 2; }
      .resultado-leyenda { display: flex; gap: 14px; justify-content: center; font-size: 12px; margin-top: 4px; }
      .resultado-leyenda-tu { color: #6fe08a; }
      .resultado-leyenda-rival { color: #ff5a5a; }
      .resultado-historias {
        list-style: none; margin: 16px 0 0; padding: 0; text-align: left;
        font-size: 13px; color: #eaf2ff; display: flex; flex-direction: column; gap: 6px;
      }
      .resultado-historias li {
        background: rgba(234, 242, 255, 0.06); border-radius: 8px; padding: 8px 10px;
      }
      .resultado-stats { margin-top: 14px; font-size: 12px; color: #cdd8e6; }
      .resultado-botones { margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      .resultado-botones button {
        font-size: 13px; font-weight: 600; padding: 10px 16px; border-radius: 8px;
        border: 1px solid rgba(234, 242, 255, 0.3); background: rgba(234, 242, 255, 0.08);
        color: #eaf2ff; cursor: pointer;
      }
      .resultado-botones button:hover:not(:disabled) { background: rgba(234, 242, 255, 0.18); }
      .resultado-botones button:disabled { opacity: 0.35; cursor: not-allowed; }
      #btn-revancha { border-color: #6fe08a; }
      .resultado-manual {
        margin-top: 10px; display: none; font-size: 12px; color: #cdd8e6;
      }
      .resultado-manual.activo { display: block; }
      .resultado-manual input {
        width: 100%; margin-top: 4px; box-sizing: border-box; font-size: 12px;
        padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(234, 242, 255, 0.3);
        background: rgba(234, 242, 255, 0.06); color: #eaf2ff;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud">Cargando…</div>
    <button id="btn-audio" type="button" title="Silenciar (M)">🔊</button>
    <div id="banner-reto"></div>
    <div id="marcador-rival"></div>
    <div id="aviso-rival"></div>
    <div id="panel-agentes"></div>
    <div id="barks"></div>
    <div id="flash-caida"></div>
    <div id="tutorial-toast"></div>
    <div id="resultado"></div>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
